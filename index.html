<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>isaahi-os</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #1a1a1a; }
        
        /* Desktop area where icons appear */
        #desktop { 
            width: 100%; 
            height: calc(100% - 60px); 
            display: flex; 
            flex-wrap: wrap; 
            align-content: flex-start; 
            gap: 25px; 
            padding: 20px; 
        }

        /* Taskbar at the bottom */
        #taskbar { 
            width: 100%; 
            height: 60px; 
            background: #222; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            position: fixed; 
            bottom: 0; 
            border-top: 1px solid #444;
        }

        .btn { background: #eee; color: #000; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* The App Icon - Blank White Box style */
        .app-icon { width: 80px; text-align: center; color: white; cursor: pointer; }
        .icon-box { 
            width: 60px; 
            height: 60px; 
            background: white; /* Blank White Box */
            border-radius: 12px; 
            margin: 0 auto 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .app-name { font-size: 13px; font-weight: 500; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Window Styling */
        .window { position: absolute; background: white; border: 1px solid #000; z-index: 100; border-radius: 8px 8px 0 0; overflow: hidden; }
        .window-header { background: #eee; padding: 8px; display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; }
        iframe { width: 100%; height: calc(100% - 35px); border: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <div id="desktop"></div>

    <div id="taskbar">
        <label class="btn">
            Install .iapp 
            <input type="file" id="installer" hidden accept=".iapp,*/*">
        </label>
    </div>

    <script src="kernel.js"></script>
    <script>
        // Check if Kernel loaded
        Module.onRuntimeInitialized = () => {
            if (Module._boot_kernel) {
                Module._boot_kernel();
                console.log("Kernel Online");
            }
        };

        const installer = document.getElementById('installer');

        installer.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Remove .iapp from the name
            const appName = file.name.replace('.iapp', '');

            try {
                const zip = await JSZip.loadAsync(file);
                
                // Save files to Kernel VFS
                for (const [path, entry] of Object.entries(zip.files)) {
                    if (!entry.dir) {
                        const content = await entry.async("string");
                        Module.ccall('write_sys_file', null, ['string', 'string'], [`/apps/${appName}/${path}`, content]);
                    }
                }

                createIcon(appName);
            } catch (err) {
                console.error("Install failed:", err);
            }
        };

        function createIcon(name) {
            const icon = document.createElement('div');
            icon.className = 'app-icon';
            icon.onclick = () => launchApp(name);
            
            icon.innerHTML = `
                <div class="icon-box"></div>
                <span class="app-name">${name}</span>
            `;
            
            document.getElementById('desktop').appendChild(icon);
        }

        function launchApp(appName) {
            const html = Module.ccall('read_sys_file', 'string', ['string'], [`/apps/${appName}/index.html`]);
            const css = Module.ccall('read_sys_file', 'string', ['string'], [`/apps/${appName}/style.css`]);

            if (html === "ERR_404") return alert("App startup failed.");

            const win = document.createElement('div');
            win.className = 'window';
            win.style.top = '50px'; win.style.left = '50px'; win.style.width = '600px'; win.style.height = '400px';
            
            win.innerHTML = `
                <div class="window-header">
                    <span>${appName}</span>
                    <button onclick="this.closest('.window').remove()">X</button>
                </div>
                <iframe id="f-${appName}"></iframe>
            `;
            document.body.appendChild(win);

            const doc = document.getElementById(`f-${appName}`).contentDocument;
            doc.open();
            doc.write(`${html}<style>${css}</style>`);
            doc.close();
        }
    </script>
</body>
</html>
