name: Compile Kernel
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to run it manually

permissions:
  contents: write  # Crucial: Allows the bot to push kernel.js/wasm back to your repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Verify Emscripten
        run: emcc -v

      - name: Compile C++ Kernel
        run: |
          emcc kernel.cpp -o kernel.js \
          -s EXPORTED_RUNTIME_METHODS='["ccall"]' \
          -s EXPORTED_FUNCTIONS='["_boot_kernel", "_read_sys_file", "_write_sys_file", "_malloc"]' \
          -s MODULARIZE=0 \
          -s ALLOW_MEMORY_GROWTH=1

      - name: Commit and Push Compiled Files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add kernel.js kernel.wasm
          git commit -m "chore: auto-compile kernel [skip ci]" || echo "No changes to commit"
          git push
